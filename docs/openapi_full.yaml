        Kept for backward compatibility.
      deprecated: true
      operationId: getDocumentReport
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json, html, pdf]
            default: json
          description: Output format for the report.
      responses:
        "200":
          description: Verification report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
            text/html:
              schema:
                type: string
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [HIGH]: Feedback endpoint partially aligns, but request schema is wrong.
