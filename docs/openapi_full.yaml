              schema:
                type: string
                format: binary
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # kept for backward compatibility / debug
  /documents/{document_id}/report:
    get:
      tags: [Reports]
      summary: "[Deprecated] Get the full verification report"
      description: >
