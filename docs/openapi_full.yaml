      summary: Get a single verification result with full audit trail
      operationId: getVerificationResult
      parameters:
        - $ref: "#/components/parameters/ResultId"
      responses:
        "200":
          description: Verification result detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResultResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── BE-10  Safety checks ──────────────────────────────────────────────────

# REVIEW [LOW/MEDIUM]: Extra endpoint not in final MVP.
