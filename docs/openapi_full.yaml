          description: If true, return only results requiring human review.
          schema:
            type: boolean
        - name: cache_source
          in: query
          required: false
          description: Filter by cache source.
          schema:
            $ref: "#/components/schemas/CacheSource"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Verification results list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResultListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [HIGH]: Endpoint exists but detail response is not aligned.
