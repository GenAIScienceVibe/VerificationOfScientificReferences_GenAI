# ==================================================================================================
# API REVIEW COMMENTS
# --------------------------------------------------------------------------------------------------
# Main gaps:
#   1) Response envelope is wrong: this file uses {success, data, error}; final contract uses
#      {success, data, message, errors, request_id}. Successful examples must always have errors: [].
#   2) API flow is step-endpoint driven. Final product flow should be pipeline-run driven:
#      upload -> POST /documents/{document_id}/pipeline-runs -> poll pipeline run -> results/report.
#   3) Missing pipeline endpoints: /health/readiness, /documents/{id}/pipeline-runs,
#      /pipeline-runs/{id}, /pipeline-runs/{id}/steps, /pipeline-runs/{id}/cancel.
#   4) Missing final report resource flow: POST /documents/{id}/reports, GET /reports/{id},
#      optional GET /reports/{id}/download.
#   5) Missing feedback/UAT coverage: /claim-reference-links/{link_id}/feedback and /uat/surveys.
#   6) Missing internal architecture APIs: /internal/rag/* and /internal/genai/*.
#   7) Many enum values are lowercase/title-case, while final contract uses uppercase stable values.
#   8) Several request bodies are missing for manual/debug POST endpoints.
#   9) Several list APIs lack pagination/filter parameters required by frontend scalability.
#  10) Some endpoints expose raw/debug internals as public APIs; mark them optional/debug, not normal UX flow.
# ==================================================================================================
openapi: 3.0.3
info:
  title: Scientific Reference Verification API
  description: >
    Backend API for uploading scientific documents and running the complete
    reference, citation, claim, evidence, and verification workflow.
  version: 0.3.0

servers:
  - url: http://localhost:8000/api/v1
    description: Local development server

tags:
  - name: Health
    description: Service health and availability
  - name: Documents
    description: Document upload, retrieval, and processing status
  - name: Text
    description: Raw text and section access
  - name: References
    description: Reference extraction and DOI lookup
  - name: Claims
    description: Claim and citation extraction and mapping
  - name: Evidence
    description: Evidence package preparation
  - name: Cache
    description: Verification cache layer
  - name: Retrieval
    description: RAG/ML evidence retrieval
  - name: Verification
    description: Full verification orchestration and results
  - name: Safety
    description: Safety rule evaluation and audit
  - name: Reports
    description: Report generation and user feedback
  - name: Internal
    description: Internal architecture APIs for RAG/ML and GenAI services. Not for frontend use.

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # ── BE-0  Health ──────────────────────────────────────────────────────────

# REVIEW [HIGH]: Exists, but not aligned with final v4.
# - Missing /health/readiness endpoint.
# - Response example uses status: ok, service: backend, version: 0.3.0, error: null.
# - Final response must use status: OK, service: refcheck-backend, version: 1.0.0,
#   timestamp, message: "Backend is healthy", errors: [], request_id.
# - Must use shared response envelope: success/data/message/errors/request_id.
  /health:
    get:
      tags: [Health]
      summary: Check backend health
      operationId: getHealth
      responses:
        "200":
          description: Backend is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                success: true
                data:
                  status: OK
                  service: refcheck-backend
                  version: 1.0.0
                  timestamp: "2026-05-24T12:00:00Z"
                message: Backend is healthy
                errors: []
                request_id: req_abc123
        "500":
          $ref: "#/components/responses/InternalServerError"

  /health/readiness:
    get:
      tags: [Health]
      summary: Check backend readiness
      description: >
        Returns whether the backend is ready to accept requests.
        Differs from /health in that it verifies upstream dependencies
        (database, RAG/ML service, GenAI service) are reachable.
      operationId: getReadiness
      responses:
        "200":
          description: Backend is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                success: true
                data:
                  status: OK
                  service: refcheck-backend
                  version: 1.0.0
                  timestamp: "2026-05-24T12:00:00Z"
                message: Backend is ready
                errors: []
                request_id: req_abc124
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ── BE-0 / BE-2  Documents ────────────────────────────────────────────────

# REVIEW [MEDIUM]: Extra endpoint not in final MVP contract.
# - A document history/list endpoint is useful, but final MVP does not require it.
# - If kept, add pagination parameters page/page_size and maybe status/search filters.
# - Response wrapper must be changed to final envelope with message/errors/request_id.
  /documents:
    get:
      tags: [Documents]
      summary: List all uploaded documents
      description: >
        Returns a paginated list of all documents.
      operationId: listDocuments
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (1-based).
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of results per page.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DocumentProcessingStatus"
          description: Filter by document processing status.
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [HIGH]: Endpoint concept is correct, but request/response are not aligned.
# - Final allows optional document_title and uploaded_by fields in multipart form.
# - Response should return upload_type: PDF and uppercase status: UPLOADED.
# - Current response uses content_type and lowercase status: uploaded.
# - Final success status code is standardized to 200 in v4; this uses 201.
# - Example must include message, errors: [], request_id and must not use error: null.
  /documents/upload:
    post:
      tags: [Documents]
      summary: Upload a PDF document
      description: >
        Accepts a PDF file upload. Returns 415 for any non-PDF file type.
        The document is stored with status "UPLOADED" and queued for text extraction.
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to upload. Only application/pdf is accepted.
                document_title:
                  type: string
                  description: Optional human-readable title for the document.
                uploaded_by:
                  type: string
                  description: Optional identifier of the user uploading the document.
      responses:
        "200":
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentUploadResponse"
              example:
                success: true
                data:
                  document_id: doc_123
                  filename: sample_paper.pdf
                  upload_type: PDF
                  status: UPLOADED
                  created_at: "2026-05-24T12:00:00Z"
                message: Document uploaded successfully.
                errors: []
                request_id: req_abc125
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [HIGH]: Endpoint concept is correct, but request body is incomplete.
# - Final request requires title + text, not filename + text.
# - Response should include title, upload_type: TEXT, status: UPLOADED.
# - Add clear validation for empty/too-short text.
# - Wrapper must use success/data/message/errors/request_id.
  /documents/text:
    post:
      tags: [Documents]
      summary: Submit a plain-text document
      description: >
        Accepts raw text as a document body. Useful for testing or when
        PDF extraction has already been done externally.
      operationId: uploadTextDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, text]
              properties:
                title:
                  type: string
                  description: Human-readable title for the document.
                text:
                  type: string
                  description: Full document text.
                  minLength: 10
                  maxLength: 500000
      responses:
        "200":
          description: Text document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [MEDIUM]: GET/DELETE concepts are valid but response contracts differ.
# - Final DELETE returns a normal JSON response wrapper, not 204 No Content.
# - Document details should expose upload_type, title/filename, status, pages_count,
#   references_count, claims_count, created_at, updated_at.
# - Current schema uses content_type/page_count and lowercase statuses.
  /documents/{document_id}:
    get:
      tags: [Documents]
      summary: Get document metadata
      operationId: getDocument
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Document found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [Documents]
      summary: Delete a document and all associated data
      description: >
        Permanently deletes the document and all associated data including
        references, claims, evidence packages, verification results, and feedback.
        Returns 409 if the document is currently being processed.
      operationId: deleteDocument
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Document deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [HIGH]: Status endpoint is important but not aligned.
# - Final response should include frontend_status, progress_percentage, current_step,
#   latest_pipeline_run_id.
# - Current schema uses step/progress/message and lowercase statuses.
# - This endpoint should complement pipeline-runs, not replace them.
  /documents/{document_id}/status:
    get:
      tags: [Documents]
      summary: Get document processing status
      description: >
        Returns the current status and active pipeline step.
        Frontend should poll this endpoint during async processing.
        Includes latest_pipeline_run_id for linking to pipeline-runs detail.
      operationId: getDocumentStatus
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Current processing status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStatusResponse"
              example:
                success: true
                data:
                  document_id: doc_123
                  status: VERIFYING
                  frontend_status: processing
                  current_step: genai_verification
                  progress_percentage: 75
                  latest_pipeline_run_id: run_abc
                  message: Running GenAI verification.
                  updated_at: "2026-05-24T12:02:00Z"
                message: Status retrieved.
                errors: []
                request_id: req_abc126
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── BE-2  Text extraction ─────────────────────────────────────────────────

# REVIEW [MEDIUM]: Extra/debug endpoint not in final MVP.
# - Raw text can be large and privacy-sensitive.
# - If kept, mark as developer/debug/admin endpoint or return only previews/chunks.
# - Final frontend mainly needs sections, claims, evidence and result details.
  /documents/{document_id}/raw-text:
    get:
      tags: [Text]
      summary: "[Debug/Admin] Get raw and cleaned extracted text"
      description: >
        Debug/admin endpoint. Raw text can be large and privacy-sensitive.
        Frontend should use /sections, /claims, or /verification-results instead.
        Only available after text extraction has completed.
      operationId: getDocumentRawText
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Raw and cleaned text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RawTextResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [MEDIUM]: Endpoint exists in final MVP, but schema differs.
# - Final section object uses section_id, name, order_index, text_preview.
# - Current schema uses type/text/start_char/end_char and may return full text.
# - Consider returning preview by default to reduce payload and privacy exposure.
  /documents/{document_id}/sections:
    get:
      tags: [Text]
      summary: Get detected document sections
      description: >
        Returns detected sections: title, abstract, body, references.
        Only available after text extraction has completed.
      operationId: getDocumentSections
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Detected sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectionsResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── BE-3  Reference extraction ────────────────────────────────────────────

# REVIEW [HIGH]: This should be optional/manual debug, not normal frontend flow.
# - Final UX uses POST /documents/{document_id}/pipeline-runs.
# - Final debug endpoint includes a request body such as {force:false, options:{}}.
# - Response should return a queued job/debug run object, not directly ReferenceListResponse.
# - Add request body and align response envelope.
  /documents/{document_id}/extract-references:
    post:
      tags: [References]
      summary: "[Debug] Extract and parse references from the document"
      description: >
        Debug/manual trigger for reference extraction. Normal flow uses
        POST /documents/{document_id}/pipeline-runs.
        Requires text extraction to have completed first (409 otherwise).
      operationId: extractReferences
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
                  description: Re-run even if references are already extracted.
                options:
                  type: object
                  additionalProperties: true
      responses:
        "202":
          description: Reference extraction queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionStartedResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [HIGH]: Endpoint is needed, but parameters and response fields are incomplete.
# - Add query parameters: metadata_status, page, page_size.
# - Final reference fields include raw_reference, extracted_title, extracted_authors,
#   extracted_year, extracted_doi, doi_status, metadata_status, metadata_match_score.
# - Current schema uses raw_text, doi, doi_normalized, position and lacks metadata_status.
  /documents/{document_id}/references:
    get:
      tags: [References]
      summary: Get all extracted references for a document
      operationId: getDocumentReferences
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - name: doi_status
          in: query
          required: false
          description: Filter by DOI status.
          schema:
            $ref: "#/components/schemas/DoiStatus"
        - name: metadata_status
          in: query
          required: false
          description: Filter by metadata lookup status.
          schema:
            type: string
            enum: [NOT_LOOKED_UP, LOOKUP_SUCCEEDED, LOOKUP_FAILED, METADATA_UNAVAILABLE]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: List of references
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [MEDIUM]: Endpoint exists in final MVP but response schema is incomplete.
# - Final single reference response should include metadata object and match_details.
# - Use extracted_* field names consistently.
# - Current response does not fully support frontend reference detail view.
  /references/{reference_id}:
    get:
      tags: [References]
      summary: Get a single reference by ID
      operationId: getReference
      parameters:
        - $ref: "#/components/parameters/ReferenceId"
      responses:
        "200":
          description: Reference details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── BE-4  DOI metadata lookup ─────────────────────────────────────────────

# REVIEW [MEDIUM]: Extra public endpoint not in final MVP.
# - Final primary flow verifies DOIs inside pipeline or debug /documents/{id}/verify-dois.
# - If kept, treat as developer/debug endpoint and add optional request body {force:false}.
# - Do not make frontend depend on this single-reference POST for the main user journey.
  /references/{reference_id}/verify-doi:
    post:
      tags: [References]
      summary: "[Debug] Look up and verify DOI metadata for one reference"
      description: >
        Debug/manual trigger for single-reference DOI lookup. Normal flow uses pipeline-runs.
        Result is cached. Missing or malformed DOIs return a safe result with
        doi_status set accordingly — they do NOT return 4xx errors.
        A 503 is returned only if the external metadata service is unreachable.
      operationId: verifyDoi
      parameters:
        - $ref: "#/components/parameters/ReferenceId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
                  description: Re-run even if metadata was already fetched.
      responses:
        "200":
          description: DOI verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoiVerificationResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [MEDIUM]: Endpoint exists in final MVP but response should align.
# - Final metadata status values: NOT_LOOKED_UP, LOOKUP_SUCCEEDED, LOOKUP_FAILED, METADATA_UNAVAILABLE.
# - Response should use metadata_status and metadata object exactly as final spec.
# - Current description says 404 if not looked up; final can represent not-looked-up with status.
  /references/{reference_id}/metadata:
    get:
      tags: [References]
      summary: Get stored metadata for a reference
      description: >
        Returns previously fetched and cached source metadata.
        Returns 404 if DOI lookup has not been run yet.
      operationId: getReferenceMetadata
      parameters:
        - $ref: "#/components/parameters/ReferenceId"
      responses:
        "200":
          description: Source metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceMetadataResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [HIGH]: This should be optional/manual debug, not normal frontend flow.
# - Final frontend starts a full pipeline run instead of calling this manually.
# - Add request body {force:false, options:{}}.
# - Final debug response returns job_id/status queued, not a completed BatchDoiVerificationResponse.
  /documents/{document_id}/verify-dois:
    post:
      tags: [References]
      summary: "[Debug] Batch-verify all DOIs in a document"
      description: >
        Debug/manual trigger for batch DOI verification. Normal flow uses pipeline-runs.
        Requires reference extraction to have completed first (409 otherwise).
      operationId: verifyAllDois
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
                options:
                  type: object
                  additionalProperties: true
      responses:
        "202":
          description: DOI verification queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionStartedResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── BE-5  Claim and citation extraction ───────────────────────────────────

# REVIEW [HIGH]: Endpoint is useful as debug, but request/response are incomplete.
# - Final debug request should allow options such as mode and sections or force/options.
# - Normal user flow should use pipeline-runs.
# - Claim extraction output must include claim_type, section_name, source_paragraph,
#   citation_text, page_number/paragraph_index/sentence_index, extraction_confidence.
  /documents/{document_id}/extract-claims:
    post:
      tags: [Claims]
      summary: "[Debug] Extract claims and citations from the document body"
      description: >
        Sends cleaned document body paragraphs to the GenAI claim extraction
        service. Validates the JSON output before storing.
        Requires text extraction to have completed (409 otherwise).
        If GenAI returns invalid JSON the backend retries once,
        then returns 502 with GENAI_INVALID_RESPONSE.
        Returns 202 immediately; poll /status for progress,
        then fetch results via GET /documents/{document_id}/claims.
      operationId: extractClaims
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "202":
          description: Claim extraction queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionStartedResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [HIGH]: Endpoint exists in final MVP but lacks required query parameters and fields.
# - Add filters: claim_type, mapping_status, page, page_size.
# - Current Claim schema lacks claim_type, section_name, source_paragraph, citation_text,
#   page_number, extraction_confidence, mapping_status.
  /documents/{document_id}/claims:
    get:
      tags: [Claims]
      summary: Get all extracted claims
      operationId: getDocumentClaims
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - name: claim_type
          in: query
          required: false
          schema:
            type: string
          description: Filter by claim type.
        - name: mapping_status
          in: query
          required: false
          schema:
            type: string
            enum: [MAPPED, UNMAPPED, UNCERTAIN]
          description: Filter by citation mapping status.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: List of claims
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [LOW/MEDIUM]: Extra endpoint not in final MVP list.
# - It may be useful for debugging, but frontend should mainly use claim-reference-links.
# - If kept, response should use citation_text/citation_style/mapped_reference_id/mapping_confidence.
  /documents/{document_id}/citations:
    get:
      tags: [Claims]
      summary: "[Debug/Optional] Get all detected in-text citations"
      description: >
        Debug/optional endpoint. Frontend should primarily use /claim-reference-links.
        If kept, response uses citation_text, citation_style, mapped_reference_id.
      operationId: getDocumentCitations
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: List of citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitationListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [HIGH]: Path name is not aligned.
# - Final path is GET /documents/{document_id}/claim-reference-links.
# - Response should include link_id, claim_text, citation_text, citation_style,
#   reference_title, doi, mapping_status, mapping_confidence.
# - Current pairs schema is too thin for frontend mapping UI.
  /documents/{document_id}/claim-reference-links:
    get:
      tags: [Claims]
      summary: Get claim-to-reference mapping links
      description: >
        Returns all claim-reference links. Uncertain mappings
        (mapping_confidence below threshold) are included but flagged.
      operationId: getClaimReferenceLinks
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Claim-reference links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimReferenceMapResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── BE-6  Evidence packages ───────────────────────────────────────────────

# REVIEW [HIGH]: This should be optional/manual debug, not normal frontend flow.
# - Add request body {force:false, options:{}}.
# - Final debug response returns queued job object.
# - Evidence preparation must include source_evidence, evidence_availability and policy versions.
  /documents/{document_id}/prepare-evidence:
    post:
      tags: [Evidence]
      summary: "[Debug] Build evidence packages for all claim-reference pairs"
      description: >
        Debug/manual trigger for evidence preparation. Normal flow uses pipeline-runs.
        Requires claims and DOI verification to have completed (409 otherwise).
      operationId: prepareEvidence
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
                options:
                  type: object
                  additionalProperties: true
      responses:
        "202":
          description: Evidence preparation queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionStartedResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [HIGH]: Endpoint exists, but schema is missing important fields.
# - Final EvidencePackage includes metadata, source_evidence {evidence_availability,text,source_url},
#   and policy {embedding_model_version,prompt_version,verification_policy_version}.
# - Current schema has evidence_level/source_url only and does not expose source_evidence text.
  /claims/{claim_id}/evidence-package:
    get:
      tags: [Evidence]
      summary: "[Debug] Get the evidence package for a single claim"
      operationId: getEvidencePackage
      parameters:
        - $ref: "#/components/parameters/ClaimId"
      responses:
        "200":
          description: Evidence package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidencePackageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── BE-7  Cache layer ─────────────────────────────────────────────────────

# REVIEW [HIGH]: Useful debug endpoint but request body is missing.
# - Final request should include include_semantic and threshold.
# - Response should include cache_status, cache_source, matched_result_id,
#   semantic_similarity, reuse_allowed.
# - Cache reuse must require same/similar claim AND same DOI/source/policy version.
  /claims/{claim_id}/check-cache:
    post:
      tags: [Cache]
      summary: "[Debug] Check exact and semantic cache for an existing verification"
      description: >
        Debug/manual cache check. Normal flow is pipeline-controlled.
        First checks for an exact hit (same normalised claim + same DOI + same policy version).
        If no exact hit, optionally queries the RAG/ML semantic cache.
        Semantic reuse threshold is ≥ 0.92 with same DOI and same policy version.
        Medium matches (0.80–0.91) are NOT auto-reused.
      operationId: checkCache
      parameters:
        - $ref: "#/components/parameters/ClaimId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                include_semantic:
                  type: boolean
                  default: true
                  description: Whether to also check the semantic cache if no exact hit.
                threshold:
                  type: number
                  format: float
                  default: 0.92
                  minimum: 0
                  maximum: 1
                  description: Minimum similarity score to consider a semantic cache hit reusable.
      responses:
        "200":
          description: Cache lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheCheckResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [LOW/MEDIUM]: Extra endpoint not in final MVP.
# - Cache result can be included in verification result or check-cache response.
# - If kept, mark as debug/internal admin. Frontend should not require it.
  /claims/{claim_id}/cache-result:
    get:
      tags: [Cache]
      summary: "[Debug/Internal] Get stored cache result for a claim"
      operationId: getCacheResult
      parameters:
        - $ref: "#/components/parameters/ClaimId"
      responses:
        "200":
          description: Cached verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheResultResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── BE-8  RAG/ML retrieval ────────────────────────────────────────────────

# REVIEW [HIGH]: Useful debug endpoint but request body is missing.
# - Final request should include force and top_k.
# - This is debug/manual; normal flow goes through pipeline.
# - RAG/ML execution should be internal/backend-controlled.
  /claims/{claim_id}/retrieve-evidence:
    post:
      tags: [Retrieval]
      summary: "[Debug] Send evidence package to RAG/ML and retrieve top evidence chunks"
      description: >
        Debug/manual RAG/ML retrieval trigger. Normal flow is pipeline-controlled.
        Requires an evidence package to exist for this claim (409 otherwise).
      operationId: retrieveEvidence
      parameters:
        - $ref: "#/components/parameters/ClaimId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
                  description: Re-run even if retrieval results already exist.
                top_k:
                  type: integer
                  default: 5
                  minimum: 1
                  maximum: 20
                  description: Number of top evidence chunks to retrieve.
      responses:
        "200":
          description: Retrieval results stored and returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalResultResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "504":
          $ref: "#/components/responses/GatewayTimeout"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [MEDIUM]: Endpoint exists, but response schema differs.
# - Final uses top_chunks, overall_similarity_score, retrieval_confidence, evidence_type, source.
# - Current schema uses chunks and source_doi only; not enough for claim detail/evidence UI.
  /claims/{claim_id}/retrieval-results:
    get:
      tags: [Retrieval]
      summary: Get stored RAG/ML retrieval results for a claim
      operationId: getRetrievalResults
      parameters:
        - $ref: "#/components/parameters/ClaimId"
      responses:
        "200":
          description: Stored retrieval results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalResultResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ── BE-9  Verification orchestration ──────────────────────────────────────

# REVIEW [CRITICAL]: Wrong main orchestration endpoint.
# - Replace with POST /documents/{document_id}/pipeline-runs.
# - Final request body includes mode, use_cache, use_rag, use_genai_safety_review, generate_report.
# - Response should return pipeline_run_id and status QUEUED.
# - This old endpoint encourages frontend to manage workflow incorrectly.
  /documents/{document_id}/pipeline-runs:
    post:
      tags: [Verification]
      summary: Start the full verification pipeline for a document
      description: >
        Triggers the complete pipeline:
        text extraction → reference extraction → DOI lookup →
        claim extraction → citation mapping → evidence packages →
        cache check → RAG retrieval → GenAI verification → safety checks → result storage.
        Returns 202 immediately with a pipeline_run_id. Poll
        GET /pipeline-runs/{pipeline_run_id} for progress.
        Returns 409 if a pipeline run is already active for this document.
      operationId: startPipelineRun
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  enum: [full, references_only, claims_only]
                  default: full
                  description: Which pipeline stages to run.
                use_cache:
                  type: boolean
                  default: true
                use_rag:
                  type: boolean
                  default: true
                use_genai_safety_review:
                  type: boolean
                  default: true
                generate_report:
                  type: boolean
                  default: true
      responses:
        "202":
          description: Pipeline run queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunStartedResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /pipeline-runs/{pipeline_run_id}:
    get:
      tags: [Verification]
      summary: Get pipeline run status and progress
      description: >
        Returns the current status of a pipeline run, including per-step
        progress. Poll this endpoint after starting a pipeline run.
      operationId: getPipelineRun
      parameters:
        - $ref: "#/components/parameters/PipelineRunId"
      responses:
        "200":
          description: Pipeline run details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /pipeline-runs/{pipeline_run_id}/steps:
    get:
      tags: [Verification]
      summary: Get individual step statuses for a pipeline run
      operationId: getPipelineRunSteps
      parameters:
        - $ref: "#/components/parameters/PipelineRunId"
      responses:
        "200":
          description: Step-by-step progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunStepsResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /pipeline-runs/{pipeline_run_id}/cancel:
    post:
      tags: [Verification]
      summary: Cancel an in-progress pipeline run
      operationId: cancelPipelineRun
      parameters:
        - $ref: "#/components/parameters/PipelineRunId"
      responses:
        "200":
          description: Pipeline run cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # kept for backward compatibility / debug
  /documents/{document_id}/run-verification:
    post:
      tags: [Verification]
      summary: "[Deprecated] Run the full verification pipeline"
      description: >
        Deprecated. Use POST /documents/{document_id}/pipeline-runs instead.
        Kept for backward compatibility during migration.
      operationId: runVerification
      deprecated: true
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "202":
          description: Verification pipeline queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationStartedResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [LOW/MEDIUM]: Extra risky debug/admin endpoint not in final MVP.
# - Resetting pipeline state can cause data loss/confusion.
# - If kept, restrict to admin/debug and require explicit request body reason/force.
  /documents/{document_id}/reset:
    post:
      tags: [Documents]
      summary: "[Admin] Reset a document's pipeline state"
      description: >
        Admin/debug endpoint. Resets the document status to UPLOADED and clears
        all extracted data (references, claims, evidence packages, verification results).
        Only allowed when the document is in a FAILED or VERIFIED state.
        Returns 409 if the document is currently being processed.
        Requires an explicit reason for audit purposes.
      operationId: resetDocument
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Reason for resetting the document. Required for audit trail.
                force:
                  type: boolean
                  default: false
                  description: If true, allow reset even when document is in VERIFIED state.
      responses:
        "200":
          description: Document reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/WorkflowConflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

# REVIEW [HIGH]: Endpoint exists but query parameters and result schema differ.
# - Final query params: support_status, human_review_required, cache_source, page, page_size.
# - Current uses needs_review instead of human_review_required.
# - Response should include document-level summary plus results with claim_text, citation_text,
#   reference_title, doi, evidence_availability, evidence_used_count, overall_similarity_score,
#   verification_method, safety_risk_level.
  /documents/{document_id}/verification-results:
    get:
      tags: [Verification]
      summary: Get all verification results for a document
      operationId: getDocumentVerificationResults
      parameters:
        - $ref: "#/components/parameters/DocumentId"
