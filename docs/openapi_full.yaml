openapi: 3.0.3
info:
  title: RefCheck AI API
  version: 1.0.0
  description: Full API specification for the Scientific Reference Verification System.
    Version 4 is generated from a single endpoint inventory used by both DOCX and
    Swagger to keep requests, responses, parameters, examples, and descriptions aligned.
servers:
- url: http://localhost:8000
  description: Local development server
tags:
- name: Health
- name: Documents
- name: Pipeline
- name: References
- name: Claims
- name: Evidence
- name: Verification
- name: Reports
- name: Feedback
- name: Debug
- name: Internal RAG/ML
- name: Internal GenAI
paths:
  /api/v1/health:
    get:
      tags:
      - Health
      summary: Check whether the backend service is alive.
      operationId: get_api_v1_health_operation
      description: 'Consumer: Frontend / DevOps. '
      parameters: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_api_v1_health_Response'
              example:
                success: true
                data:
                  status: OK
                  service: refcheck-backend
                  version: 1.0.0
                  timestamp: '2026-05-23T10:00:00Z'
                message: Backend is healthy
                errors: []
                request_id: req_12345
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                data: null
                message: Request failed
                errors:
                - code: INTERNAL_SERVER_ERROR
                  field: server
                  detail: Internal Server Error
                request_id: req_12345
  /api/v1/health/readiness:
    get:
      tags:
      - Health
      summary: Check whether critical dependencies are ready.
      operationId: get_api_v1_health_readiness_operation
      description: 'Consumer: Frontend / DevOps. '
      parameters: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_api_v1_health_readiness_Response'
              example:
                success: true
                data:
                  database: OK
                  file_storage: OK
                  metadata_lookup: OK
                  rag_service: OK
                  genai_service: OK
                message: All dependencies are ready
                errors: []
                request_id: req_12345
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id001
                success: false
                data: null
                message: Request failed
                errors:
                - code: SERVICE_UNAVAILABLE
                  field: server
                  detail: Dependency is unavailable
                request_id: req_12345
        '503':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id001
  /api/v1/documents/upload:
    post:
      tags:
      - Documents
      summary: Upload a scientific paper as a PDF.
      operationId: post_api_v1_documents_upload_operation
      description: 'Consumer: Frontend. Frontend uses this for PDF upload only. Plain
        text uses /documents/text.'
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/post_api_v1_documents_upload_Request'
            example:
              file: <binary PDF file>
              document_title: Optional paper title
              uploaded_by: Optional uploader identifier
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/post_api_v1_documents_upload_Response'
              example:
                success: true
                data:
                  document_id: doc_001
                  filename: sample-paper.pdf
                  upload_type: PDF
                  status: UPLOADED
                  file_size_bytes: 2456789
                  created_at: '2026-05-23T10:00:00Z'
                message: Document uploaded successfully
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id002
                success: false
                data: null
                message: Request failed
                errors:
                - code: FILE_REQUIRED
                  field: file
                  detail: A PDF file is required
                request_id: req_12345
        '413':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id002
        '415':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id002
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id002
  /api/v1/documents/text:
    post:
      tags:
      - Documents
      summary: Submit scientific text directly without uploading a PDF.
      operationId: post_api_v1_documents_text_operation
      description: 'Consumer: Frontend. '
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/post_api_v1_documents_text_Request'
            example:
              title: Sample Scientific Text
              text: Generative AI tools can improve academic writing productivity
                (Smith, 2023). References...
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/post_api_v1_documents_text_Response'
              example:
                success: true
                data:
                  document_id: doc_002
                  title: Sample Scientific Text
                  upload_type: TEXT
                  status: UPLOADED
                  created_at: '2026-05-23T10:05:00Z'
                message: Text document submitted successfully
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id003
                success: false
                data: null
                message: Request failed
                errors:
                - code: EMPTY_TEXT
                  field: text
                  detail: Text input must not be empty
                request_id: req_12345
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id003
  /api/v1/documents/{document_id}:
    get:
      tags:
      - Documents
      summary: Get document metadata and processing summary.
      operationId: get_api_v1_documents_document_id_operation
      description: 'Consumer: Frontend. '
      parameters:
      - &id005
        name: document_id
        in: path
        required: true
        schema:
          type: string
        description: 'Importance: Identifies the document whose uploaded content,
          references, claims, results, or report should be accessed.'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_api_v1_documents_document_id_Response'
              example:
                success: true
                data:
                  document_id: doc_001
                  filename: sample-paper.pdf
                  title: AI Writing Assistants in Academic Research
                  upload_type: PDF
                  status: TEXT_EXTRACTED
                  pages_count: 12
                  references_count: 18
                  claims_count: 0
                  created_at: '2026-05-23T10:00:00Z'
                  updated_at: '2026-05-23T10:06:00Z'
                message: Document retrieved successfully
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id004
                success: false
                data: null
                message: Request failed
                errors:
                - code: DOCUMENT_NOT_FOUND
                  field: document_id
                  detail: Document not found
                request_id: req_12345
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id004
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id004
    delete:
      tags:
      - Documents
      summary: Delete a document and its associated analysis data.
      operationId: delete_api_v1_documents_document_id_operation
      description: 'Consumer: Frontend. Optional but recommended for privacy and data
        minimization.'
      parameters:
      - *id005
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/delete_api_v1_documents_document_id_Response'
              example:
                success: true
                data:
                  document_id: doc_001
                  deleted: true
                message: Document deleted successfully
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id006
                success: false
                data: null
                message: Request failed
                errors:
                - code: DOCUMENT_NOT_FOUND
                  field: document_id
                  detail: Document not found
                request_id: req_12345
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id006
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id006
  /api/v1/documents/{document_id}/status:
    get:
      tags:
      - Documents
      summary: Get current document processing status for progress display.
      operationId: get_api_v1_documents_document_id_status_operation
      description: 'Consumer: Frontend. '
      parameters:
      - *id005
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_api_v1_documents_document_id_status_Response'
              example:
                success: true
                data:
                  document_id: doc_001
                  status: DOI_VERIFYING
                  frontend_status: Checking references
                  progress_percentage: 45
                  current_step: DOI_METADATA_LOOKUP
                  latest_pipeline_run_id: run_001
                message: Document status retrieved successfully
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id007
                success: false
                data: null
                message: Request failed
                errors:
                - code: DOCUMENT_NOT_FOUND
                  field: document_id
                  detail: Document not found
                request_id: req_12345
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id007
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id007
  /api/v1/documents/{document_id}/sections:
    get:
      tags:
      - Documents
      summary: Get extracted document sections.
      operationId: get_api_v1_documents_document_id_sections_operation
      description: 'Consumer: Frontend. '
      parameters:
      - *id005
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_api_v1_documents_document_id_sections_Response'
              example:
                success: true
                data:
                  document_id: doc_001
                  sections:
                  - section_id: sec_001
                    name: Abstract
                    order_index: 1
                    text_preview: This study investigates...
                  - section_id: sec_002
                    name: Introduction
                    order_index: 2
                    text_preview: Recent advances in generative AI...
                  - section_id: sec_003
                    name: References
                    order_index: 8
                    text_preview: Smith, J. (2023)...
                message: Document sections retrieved successfully
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id008
                success: false
                data: null
                message: Request failed
                errors:
                - code: DOCUMENT_NOT_FOUND
                  field: document_id
                  detail: Document not found
                request_id: req_12345
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id008
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id008
  /api/v1/documents/{document_id}/pipeline-runs:
    post:
      tags:
      - Pipeline
      summary: Start the full verification pipeline for one document.
      operationId: post_api_v1_documents_document_id_pipeline_runs_operation
      description: 'Consumer: Frontend. '
      parameters:
      - *id005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/post_api_v1_documents_document_id_pipeline_runs_Request'
            example:
              mode: FULL_VERIFICATION
              use_cache: true
              use_rag: true
              use_genai_safety_review: true
              generate_report: false
              priority: NORMAL
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/post_api_v1_documents_document_id_pipeline_runs_Response'
              example:
                success: true
                data:
                  pipeline_run_id: run_001
                  document_id: doc_001
                  status: QUEUED
                  mode: FULL_VERIFICATION
                  created_at: '2026-05-23T10:10:00Z'
                message: Verification pipeline started
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id009
                success: false
                data: null
                message: Request failed
                errors:
                - code: DOCUMENT_NOT_FOUND
                  field: document_id
                  detail: Document not found
                request_id: req_12345
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id009
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id009
  /api/v1/pipeline-runs/{pipeline_run_id}:
    get:
      tags:
      - Pipeline
      summary: Get pipeline run progress and high-level state.
      operationId: get_api_v1_pipeline_runs_pipeline_run_id_operation
      description: 'Consumer: Frontend. '
      parameters:
      - &id011
        name: pipeline_run_id
        in: path
        required: true
        schema:
          type: string
        description: 'Importance: Identifies the asynchronous pipeline run to inspect
          or cancel.'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_api_v1_pipeline_runs_pipeline_run_id_Response'
              example:
                success: true
                data:
                  pipeline_run_id: run_001
                  document_id: doc_001
                  status: RUNNING
                  progress_percentage: 55
                  current_step: RAG_EVIDENCE_RETRIEVAL
                  started_at: '2026-05-23T10:10:10Z'
                  completed_at: null
                  warnings: []
                message: Pipeline status retrieved successfully
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id010
                success: false
                data: null
                message: Request failed
                errors:
                - code: PIPELINE_RUN_NOT_FOUND
                  field: pipeline_run_id
                  detail: Pipeline run not found
                request_id: req_12345
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id010
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id010
  /api/v1/pipeline-runs/{pipeline_run_id}/steps:
    get:
      tags:
      - Pipeline
      summary: Get detailed status of each pipeline step.
      operationId: get_api_v1_pipeline_runs_pipeline_run_id_steps_operation
      description: 'Consumer: Frontend. '
      parameters:
      - *id011
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_api_v1_pipeline_runs_pipeline_run_id_steps_Response'
              example:
                success: true
                data:
                  pipeline_run_id: run_001
                  steps:
                  - step_name: TEXT_EXTRACTION
                    status: SUCCEEDED
                    progress_percentage: 100
                    started_at: '2026-05-23T10:10:10Z'
                    completed_at: '2026-05-23T10:10:25Z'
                    error_message: null
                  - step_name: REFERENCE_EXTRACTION
                    status: SUCCEEDED
                    progress_percentage: 100
                    started_at: '2026-05-23T10:10:26Z'
                    completed_at: '2026-05-23T10:10:45Z'
                    error_message: null
                  - step_name: CLAIM_EXTRACTION
                    status: RUNNING
                    progress_percentage: 60
                    started_at: '2026-05-23T10:11:20Z'
                    completed_at: null
                    error_message: null
                message: Pipeline steps retrieved successfully
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id012
                success: false
                data: null
                message: Request failed
                errors:
                - code: PIPELINE_RUN_NOT_FOUND
                  field: pipeline_run_id
                  detail: Pipeline run not found
                request_id: req_12345
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id012
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id012
  /api/v1/pipeline-runs/{pipeline_run_id}/cancel:
    post:
      tags:
      - Pipeline
      summary: Cancel a running pipeline.
      operationId: post_api_v1_pipeline_runs_pipeline_run_id_cancel_operation
      description: 'Consumer: Frontend / Debug. '
      parameters:
      - *id011
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/post_api_v1_pipeline_runs_pipeline_run_id_cancel_Request'
            example:
              reason: User cancelled from progress screen
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/post_api_v1_pipeline_runs_pipeline_run_id_cancel_Response'
              example:
                success: true
                data:
                  pipeline_run_id: run_001
                  status: CANCELLED
                message: Pipeline run cancelled successfully
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id013
                success: false
                data: null
                message: Request failed
                errors:
                - code: PIPELINE_RUN_NOT_FOUND
                  field: pipeline_run_id
                  detail: Pipeline run not found
                request_id: req_12345
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id013
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id013
  /api/v1/documents/{document_id}/references:
    get:
      tags:
      - References
      summary: List references extracted from a document.
      operationId: get_api_v1_documents_document_id_references_operation
      description: 'Consumer: Frontend. '
      parameters:
      - *id005
      - name: doi_status
        in: query
        required: false
        schema:
          type: string
        description: 'Importance: Filters references by DOI validity state.'
      - name: metadata_status
        in: query
        required: false
        schema:
          type: string
        description: 'Importance: Filters references by metadata lookup status.'
      - &id020
        name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
        description: 'Importance: Supports pagination for large documents.'
      - &id021
        name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 20
        description: 'Importance: Controls page size to keep frontend responses efficient.'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_api_v1_documents_document_id_references_Response'
              example:
                success: true
                data:
                  document_id: doc_001
                  total: 18
                  page: 1
                  page_size: 20
                  references:
                  - reference_id: ref_001
                    reference_key: Smith_2023
                    raw_reference: Smith, J. (2023). AI Writing Assistants and Student
                      Productivity...
                    extracted_title: AI Writing Assistants and Student Productivity
                    extracted_authors: &id015
                    - Smith, J.
                    extracted_year: '2023'
                    extracted_doi: 10.1234/aiwriting.2023.001
                    doi_status: VALID
                    metadata_status: LOOKUP_SUCCEEDED
                    metadata_match_score: 0.93
                message: References retrieved successfully
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id014
                success: false
                data: null
                message: Request failed
                errors:
                - code: DOCUMENT_NOT_FOUND
                  field: document_id
                  detail: Document not found
                request_id: req_12345
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id014
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id014
  /api/v1/references/{reference_id}:
    get:
      tags:
      - References
      summary: Get one reference with metadata and match details.
      operationId: get_api_v1_references_reference_id_operation
      description: 'Consumer: Frontend. '
      parameters:
      - &id017
        name: reference_id
        in: path
        required: true
        schema:
          type: string
        description: 'Importance: Identifies one extracted reference and its DOI/metadata
          details.'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get_api_v1_references_reference_id_Response'
              example:
                success: true
                data:
                  reference_id: ref_001
                  reference_key: Smith_2023
                  raw_reference: Smith, J. (2023). AI Writing Assistants and Student
                    Productivity...
                  extracted_title: AI Writing Assistants and Student Productivity
                  extracted_authors: *id015
                  extracted_year: '2023'
                  extracted_doi: 10.1234/aiwriting.2023.001
                  doi_status: VALID
                  metadata_status: LOOKUP_SUCCEEDED
                  metadata_match_score: 0.93
                  document_id: doc_001
                  metadata: &id018
                    title: AI Writing Assistants and Student Productivity
                    authors:
                    - John Smith
                    year: '2023'
                    venue: Journal of AI Education
                    publisher: Example Publisher
                    abstract: This study investigates how AI writing assistants affect
                      drafting speed...
                    url: https://doi.org/10.1234/aiwriting.2023.001
                  match_details:
                    title_match: 0.96
                    author_match: 0.91
                    year_match: true
                    metadata_match_score: 0.93
                message: Reference retrieved successfully
                errors: []
                request_id: req_12345
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: &id016
                success: false
                data: null
                message: Request failed
                errors:
                - code: REFERENCE_NOT_FOUND
                  field: reference_id
                  detail: Reference not found
                request_id: req_12345
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: *id016
        '500':
          description: Error response
          content:
